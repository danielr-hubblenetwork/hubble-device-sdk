common:
  platform_allow:
    - nrf52840dk/nrf52840
    - nrf52_bsim
    - native_sim/native/64
  tags:
    - ble
    - security
    - nonce
  integration_platforms:
    - nrf52840dk/nrf52840

tests:
  ble.nonce:
    extra_configs:
      - CONFIG_HUBBLE_NETWORK_CRYPTO_MBEDTLS=y
      - CONFIG_HUBBLE_COUNTER_SOURCE_UNIX_TIME=y
  ble.nonce.psa:
    extra_configs:
      - CONFIG_HUBBLE_NETWORK_CRYPTO_PSA=y
      - CONFIG_HUBBLE_COUNTER_SOURCE_UNIX_TIME=y
  ble.counter:
    extra_configs:
      - CONFIG_HUBBLE_NETWORK_CRYPTO_MBEDTLS=y
      - CONFIG_HUBBLE_COUNTER_SOURCE_DEVICE_UPTIME=y
      - CONFIG_HUBBLE_EID_ROTATION_PERIOD_SEC=86400
      - CONFIG_HUBBLE_NETWORK_SEQUENCE_NONCE_CUSTOM=y
  ble.counter.psa:
    extra_configs:
      - CONFIG_HUBBLE_NETWORK_CRYPTO_PSA=y
      - CONFIG_HUBBLE_COUNTER_SOURCE_DEVICE_UPTIME=y
      - CONFIG_HUBBLE_EID_ROTATION_PERIOD_SEC=86400
      - CONFIG_HUBBLE_NETWORK_SEQUENCE_NONCE_CUSTOM=y
